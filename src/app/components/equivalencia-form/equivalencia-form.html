<div class="form-card">

  <!-- Card Header -->
  <div class="card-head">
    <div class="card-head-icon">
      <i class="fas fa-calculator"></i>
    </div>
    <div>
      <h5 class="card-head-title">Calcular Equivalências</h5>
      <p class="card-head-subtitle">Selecione o alimento e a quantidade</p>
    </div>
  </div>

  <!-- Card Body -->
  <div class="card-body-inner">

    <!-- Feedback -->
    <div *ngIf="mensagem" class="feedback-alert"
      [class.feedback-success]="tipoMensagem === 'success'"
      [class.feedback-error]="tipoMensagem !== 'success'">
      <i [ngClass]="tipoMensagem === 'success' ? 'fas fa-check-circle' : 'fas fa-exclamation-circle'"></i>
      <span>{{ mensagem }}</span>
      <button class="feedback-close" (click)="mensagem = ''" aria-label="Fechar">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <!-- Form -->
    <form [formGroup]="form" (ngSubmit)="enviar()">

      <!-- Selecionar Grupo -->
      <div class="field-group">
        <label for="grupo" class="field-label">
          <i class="fas fa-layer-group"></i>Grupo Alimentar
        </label>
        <div class="field-input-wrap">
          <span class="field-prefix"><i class="fas fa-folder"></i></span>
          <select
            class="field-input"
            id="grupo"
            formControlName="grupo"
            [class.invalid]="form.get('grupo')?.invalid && form.get('grupo')?.touched">
            <option value="" disabled>-- Selecione um grupo --</option>
            <option *ngFor="let grupo of grupos" [value]="grupo">
              {{ grupo }}
            </option>
          </select>
        </div>
        <span class="field-error"
          *ngIf="form.get('grupo')?.invalid && form.get('grupo')?.touched">
          <i class="fas fa-exclamation-triangle"></i>Grupo é obrigatório
        </span>
      </div>

      <!-- Selecionar Alimento -->
      <div class="field-group">
        <label for="alimentoId" class="field-label">
          <i class="fas fa-leaf"></i>Alimento
        </label>
        <div class="field-input-wrap">
          <span class="field-prefix"><i class="fas fa-apple-alt"></i></span>
          <select
            class="field-input"
            id="alimentoId"
            formControlName="alimentoId"
            [disabled]="alimentos.length === 0 || carregandoAlimentos"
            [class.invalid]="form.get('alimentoId')?.invalid && form.get('alimentoId')?.touched">
            <option value="" disabled>
              {{ carregandoAlimentos ? 'Carregando alimentos...' : '-- Selecione um alimento --' }}
            </option>
            <option *ngFor="let alimento of alimentos" [value]="alimento.id">
              {{ alimento.descricao }}
            </option>
          </select>
        </div>
        <span class="field-error"
          *ngIf="form.get('alimentoId')?.invalid && form.get('alimentoId')?.touched">
          <i class="fas fa-exclamation-triangle"></i>Alimento é obrigatório
        </span>
      </div>

      <!-- Quantidade -->
      <div class="field-group">
        <label for="quantidade" class="field-label">
          <i class="fas fa-weight"></i>Quantidade
        </label>
        <div class="field-input-wrap">
          <span class="field-prefix"><i class="fas fa-balance-scale"></i></span>
          <input
            type="number"
            class="field-input"
            id="quantidade"
            formControlName="quantidade"
            placeholder="Ex: 100"
            [class.invalid]="form.get('quantidade')?.invalid && form.get('quantidade')?.touched"
            step="0.01"
            min="0.01">
          <span class="field-suffix">g</span>
        </div>
        <span class="field-error"
          *ngIf="form.get('quantidade')?.invalid && form.get('quantidade')?.touched">
          <i class="fas fa-exclamation-triangle"></i>Quantidade deve ser maior que 0
        </span>
      </div>

      <!-- Botões de Ação -->
      <div class="form-actions">
        <button type="submit" class="btn-calc" [disabled]="carregando || form.invalid">
          <span class="spinner-border spinner-border-sm" *ngIf="carregando" role="status"></span>
          <i class="fas fa-search" *ngIf="!carregando"></i>
          {{ carregando ? 'Calculando...' : 'Calcular' }}
        </button>
        <button type="button" class="btn-reset" (click)="limpar()" [disabled]="carregando">
          <i class="fas fa-redo"></i>Limpar
        </button>
      </div>

    </form>
  </div>

</div>
