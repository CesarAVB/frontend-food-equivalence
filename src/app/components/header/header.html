<header class="site-header">
  <div class="container-fluid">
    <div class="header-inner">

      <!-- Brand -->
      <a class="brand" href="/">
        <img src="images/logo-reduzido.png" alt="Lista de Substituição - André Reis" class="brand-logo">
      </a>

      <!-- Right side -->
      <div class="header-right">

        @if (usuario$ | async; as usuario) {
          <!-- Usuário logado -->
          <div class="user-chip">
            <span class="user-avatar" [title]="usuario.email">
              {{ iniciais(usuario.nome) }}
            </span>
            <span class="user-nome">{{ usuario.nome }}</span>
          </div>

          <button class="logout-btn" (click)="logout()" title="Sair da conta">
            <i class="fas fa-sign-out-alt"></i>
            <span class="logout-label">Sair</span>
          </button>
        }

        <a
          href="https://www.instagram.com/personalnutri.andrereis"
          target="_blank"
          rel="noopener noreferrer"
          class="insta-btn"
          title="Instagram do Nutricionista">
          <i class="fab fa-instagram"></i>
          <span class="insta-label">@personalnutri.andrereis</span>
        </a>

      </div>

    </div>
  </div>
</header>
