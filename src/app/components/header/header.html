<header class="site-header">
  <div class="container-fluid">
    <div class="header-inner">

      <!-- Brand -->
      <div class="brand-cluster">
        <a class="brand" href="/">
          <img src="images/logo-reduzido.png" alt="Lista de Substituição - André Reis" class="brand-logo">
        </a>
      </div>

      <!-- Right side -->
      <div class="header-right">

        @if (usuario$ | async; as usuario) {
          <!-- Sessão do usuário -->
          <div class="account-panel">
            <div class="user-chip" [title]="usuario.email">
              <span class="user-avatar">
                {{ iniciais(usuario.nome) }}
              </span>
              <div class="user-meta">
                <span class="user-nome">{{ usuario.nome }}</span>
                <span class="user-email">{{ usuario.email }}</span>
              </div>
            </div>

            <span class="session-badge" aria-label="Sessão ativa">
              <i class="fas fa-circle"></i>
              Online
            </span>

            <button class="logout-btn" (click)="logout()" title="Sair da conta">
              <i class="fas fa-sign-out-alt"></i>
              <span class="logout-label">Sair</span>
            </button>
          </div>
        }

      </div>

    </div>
  </div>
</header>
